<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전기기능사 필기 300선 마스터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        
        .perspective { perspective: 1000px; }
        .flip-card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .flipped { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .flip-card-back { transform: rotateY(180deg); }
        
        .view-section { transition: opacity 0.3s ease-in-out; }
        .hidden { display: none; opacity: 0; }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* 즐겨찾기 애니메이션 */
        .star-active { fill: #fbbf24; stroke: #fbbf24; transform: scale(1.2); transition: all 0.2s; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- MAIN MENU VIEW -->
    <div id="menu-view" class="w-full max-w-4xl view-section">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black text-slate-900 mb-3">⚡ 전기기능사 300선</h1>
            <p class="text-slate-500">합격을 위한 과목별 핵심 암기카드 및 오답노트</p>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Theory -->
            <div onclick="startStudy('theory')" class="group bg-white p-6 rounded-3xl shadow-sm hover:shadow-xl border border-slate-200 transition-all cursor-pointer flex flex-col items-center text-center hover:-translate-y-2">
                <div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                </div>
                <h3 class="text-lg font-bold text-slate-800 mb-1">전기이론</h3>
                <p class="text-slate-400 text-xs italic">100 Cards</p>
            </div>

            <!-- Machine -->
            <div onclick="startStudy('machine')" class="group bg-white p-6 rounded-3xl shadow-sm hover:shadow-xl border border-slate-200 transition-all cursor-pointer flex flex-col items-center text-center hover:-translate-y-2">
                <div class="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /></svg>
                </div>
                <h3 class="text-lg font-bold text-slate-800 mb-1">전기기기</h3>
                <p class="text-slate-400 text-xs italic">100 Cards</p>
            </div>

            <!-- Install -->
            <div onclick="startStudy('install')" class="group bg-white p-6 rounded-3xl shadow-sm hover:shadow-xl border border-slate-200 transition-all cursor-pointer flex flex-col items-center text-center hover:-translate-y-2">
                <div class="w-14 h-14 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
                </div>
                <h3 class="text-lg font-bold text-slate-800 mb-1">전기설비</h3>
                <p class="text-slate-400 text-xs italic">100 Cards</p>
            </div>

            <!-- Saved Cards -->
            <div onclick="startStudy('saved')" class="group bg-white p-6 rounded-3xl shadow-sm hover:shadow-xl border border-slate-200 transition-all cursor-pointer flex flex-col items-center text-center hover:-translate-y-2">
                <div class="w-14 h-14 bg-rose-100 text-rose-600 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 fill-rose-600" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.175 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.382-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" /></svg>
                </div>
                <h3 class="text-lg font-bold text-slate-800 mb-1">저장된 카드</h3>
                <p id="saved-count-label" class="text-slate-400 text-xs italic">0 Cards</p>
            </div>
        </div>
        
        <footer class="mt-12 text-center text-slate-400 text-xs">
            © 2024 전기기능사 마스터 플래시카드 | 로컬 저장소 사용
        </footer>
    </div>

    <!-- STUDY VIEW -->
    <div id="study-view" class="w-full max-w-xl hidden view-section">
        <!-- Top Nav -->
        <div class="flex justify-between items-center mb-6">
            <button onclick="goBack()" class="flex items-center gap-2 text-slate-500 hover:text-slate-800 transition font-medium text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                메뉴
            </button>
            <span id="header-title" class="text-lg font-bold text-slate-800">전기이론</span>
            <div class="flex items-center gap-2 bg-white px-3 py-1 rounded-full border border-slate-200 shadow-sm">
                <span class="text-[10px] font-bold text-slate-400">JUMP</span>
                <input type="number" id="jump-input" placeholder="0" class="w-10 text-center text-sm font-bold text-blue-600 focus:outline-none" min="1">
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 border border-slate-100">
            <div class="flex justify-between text-[10px] font-bold mb-2 text-slate-400 uppercase tracking-widest">
                <span id="progress-text">1 / 100</span>
                <span id="percent-text">1%</span>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-1.5">
                <div id="progress-bar" class="bg-blue-600 h-1.5 rounded-full transition-all duration-300"></div>
            </div>
        </div>

        <!-- Card Container -->
        <div class="perspective w-full h-[380px] mb-8 relative">
            <!-- Save Button (Floating) -->
            <button id="save-toggle-btn" onclick="event.stopPropagation(); toggleSaveCurrent();" class="absolute top-6 right-6 z-20 w-12 h-12 bg-white/80 backdrop-blur rounded-full flex items-center justify-center shadow-lg hover:scale-110 active:scale-90 transition group">
                <svg id="star-icon" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-slate-300 stroke-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.175 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.382-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
                </svg>
            </button>

            <div id="card-inner" onclick="flipCard()" class="flip-card-inner w-full h-full relative shadow-2xl rounded-[2.5rem]">
                <!-- Front -->
                <div class="flip-card-front absolute w-full h-full bg-white rounded-[2.5rem] p-10 flex flex-col items-center justify-center text-center border-2 border-slate-50">
                    <div id="card-badge" class="absolute top-8 left-10 px-3 py-1 bg-slate-100 text-slate-500 text-[10px] font-bold rounded-full uppercase tracking-tighter">QUESTION</div>
                    <h2 id="card-front-text" class="text-2xl md:text-3xl font-extrabold text-slate-800 leading-tight">...</h2>
                    <p class="absolute bottom-8 text-[11px] text-slate-300 uppercase tracking-widest">Tap to reveal answer</p>
                </div>
                <!-- Back -->
                <div id="card-back-bg" class="flip-card-back absolute w-full h-full bg-blue-600 rounded-[2.5rem] p-10 flex flex-col items-center justify-center text-center text-white border-4 border-white/10 shadow-inner">
                    <div class="absolute top-8 left-10 px-3 py-1 bg-white/20 text-white text-[10px] font-bold rounded-full uppercase tracking-tighter">ANSWER</div>
                    <h2 id="card-back-text" class="text-xl md:text-2xl font-semibold leading-relaxed">...</h2>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="grid grid-cols-3 gap-4">
            <button onclick="prevCard()" class="bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 font-bold py-5 rounded-3xl shadow-sm transition active:scale-95">이전</button>
            <button onclick="flipCard()" class="bg-slate-900 hover:bg-black text-white font-bold py-5 rounded-3xl shadow-lg transition active:scale-95">뒤집기</button>
            <button onclick="nextCard()" class="bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 font-bold py-5 rounded-3xl shadow-sm transition active:scale-95">다음</button>
        </div>

        <div class="mt-8 flex justify-center">
            <button onclick="shuffleCurrent()" class="text-slate-400 hover:text-blue-600 text-sm flex items-center gap-2 transition font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                현재 목록 섞기
            </button>
        </div>
    </div>

                { q: "저압 옥내 배선 최소 굵기", a: "2.5mm²" },
                { q: "소출력 회로 전압 기준", a: "60V 이하" },
                { q: "제어 회로 최소 굵기", a: "1.5mm² 이상" },
                { q: "금속관 전선 점유율", a: "48% 이하" },
                { q: "풀박스 용도", a: "긴 전선로 통과" },
                { q: "정크션 박스 용도", a: "접속점 설치" },

                { q: "덕트 수직 설치 지지점", a: "6m 이하" },

                { q: "케이블 트레이 종류", a: "사다리형, 펀칭형, 매쉬형" },
                { q: "수용률 공식", a: "최대수요전력 / 설비용량" },
                { q: "부하율 공식", a: "평균전력 / 최대전력" },

                { q: "케이블 헤드(CH) 용도", a: "가공선과 케이블 접속" },
                { q: "영상 변류기(ZCT) 용도", a: "지락 전류 검출" },
                { q: "전력 퓨즈(PF) 특징", a: "재투입 불가" },
                { q: "단로기(DS) 특징", a: "부하 전류 차단 불가" },
                { q: "가공 지선 용도", a: "선로 보호" },
                { q: "현수 애자 개수(22.9kV)", a: "2~3개" },
                { q: "전선 지름 단위", a: "[mm]" },
                { q: "전선 단면적 단위", a: "[mm²]" },
                { q: "중성선 색상", a: "백색 또는 회색" },
                { q: "검상기 용도", a: "상 회전 확인" },
                { q: "새들 (Saddle) 용도", a: "노출 배관 지지" },
                { q: "벽면 콘센트 심볼", a: "●" },
                { q: "바닥면 콘센트 심볼", a: "◈" },
                { q: "천장 조명 심볼", a: "○" },
                { q: "3로 스위치 용도", a: "2개소 점멸" },
                { q: "4로 스위치 용도", a: "3개소 이상 점멸" },
                { q: "연접 인입선 도로 횡단", a: "5m 이상" },
                { q: "인입선 지상 높이", a: "5m 이상" },
                { q: "농사용 가공전선 높이", a: "3.5m 이상" },
                { q: "슬리브 접속 특징", a: "압착기로 압착" },
                { q: "솔더리스 커넥터 특징", a: "납땜 불필요" },
                { q: "저압 절연저항 기준", a: "1.0 MΩ 이상" },
                { q: "특별저압(ELV) 전압", a: "AC 50V 이하" },
                { q: "수영장 조명 전압", a: "150V 이하" },
                { q: "과전류 차단기 설치", a: "단락 보호" }
            ]
        };

        // 데이터 초기화: 각 카드에 고유 ID 부여 및 전체 목록 생성
        const fullList = [];
        Object.keys(baseData).forEach(cat => {
            baseData[cat].forEach((item, idx) => {
                item.id = `${cat}-${idx}`;
                fullList.push(item);
            });
        });

        // 상태 관리
        let currentCategory = 'theory';
        let currentIndex = { theory: 0, machine: 0, install: 0, saved: 0 };
        let activeData = { theory: [...baseData.theory], machine: [...baseData.machine], install: [...baseData.install], saved: [] };
        let isFlipped = false;
        
        // 즐겨찾기 목록 (localStorage에서 불러옴)
        let savedIds = JSON.parse(localStorage.getItem('saved_flashcards')) || [];

        // UI 업데이트: 메뉴에서 저장된 카드 개수 표시
        function updateMenuLabels() {
            document.getElementById('saved-count-label').innerText = `${savedIds.length} Cards`;
        }

        // 특정 카테고리로 학습 시작
        function startStudy(cat) {
            currentCategory = cat;
            
            if (cat === 'saved') {
                activeData.saved = fullList.filter(item => savedIds.includes(item.id));
                if (activeData.saved.length === 0) {
                    alert("저장된 카드가 없습니다. 먼저 카드를 저장해 주세요!");
                    return;
                }
            }

            document.getElementById('menu-view').classList.add('hidden');
            document.getElementById('study-view').classList.remove('hidden');
            
            // UI 테마 설정
            const backBg = document.getElementById('card-back-bg');
            const pBar = document.getElementById('progress-bar');
            const jumpIn = document.getElementById('jump-input');
            
            let colorClass = "blue";
            if (cat === 'machine') colorClass = "emerald";
            if (cat === 'install') colorClass = "amber";
            if (cat === 'saved') colorClass = "rose";
            
            backBg.className = `flip-card-back absolute w-full h-full bg-${colorClass}-600 rounded-[2.5rem] p-10 flex flex-col items-center justify-center text-center text-white border-4 border-white/10 shadow-inner`;
            pBar.className = `bg-${colorClass}-600 h-1.5 rounded-full transition-all duration-300`;
            jumpIn.className = `w-10 text-center text-sm font-bold text-${colorClass}-600 focus:outline-none`;
            
            updateCard();
        }

        function goBack() {
            document.getElementById('study-view').classList.add('hidden');
            document.getElementById('menu-view').classList.remove('hidden');
            updateMenuLabels();
        }

        function updateCard() {
            const index = currentIndex[currentCategory];
            const data = activeData[currentCategory][index];
            
            isFlipped = false;
            document.getElementById('card-inner').classList.remove('flipped');
            
            setTimeout(() => {
                document.getElementById('card-front-text').innerText = data.q;
                document.getElementById('card-back-text').innerText = data.a;
                
                let title = "전기이론";
                if (currentCategory === 'machine') title = "전기기기";
                if (currentCategory === 'install') title = "전기설비";
                if (currentCategory === 'saved') title = "저장된 카드";
                document.getElementById('header-title').innerText = title;
                
                const total = activeData[currentCategory].length;
                const currentNum = index + 1;
                const percent = Math.round((currentNum / total) * 100);
                
                document.getElementById('progress-text').innerText = `${currentNum} / ${total}`;
                document.getElementById('percent-text').innerText = `${percent}%`;
                document.getElementById('progress-bar').style.width = `${percent}%`;
                document.getElementById('jump-input').value = currentNum;
                
                // 저장 아이콘 상태 업데이트
                updateSaveIcon(data.id);
            }, 100);
        }

        function updateSaveIcon(id) {
            const icon = document.getElementById('star-icon');
            if (savedIds.includes(id)) {
                icon.classList.add('star-active');
            } else {
                icon.classList.remove('star-active');
            }
        }

        function toggleSaveCurrent() {
            const currentItem = activeData[currentCategory][currentIndex[currentCategory]];
            const id = currentItem.id;
            
            if (savedIds.includes(id)) {
                savedIds = savedIds.filter(savedId => savedId !== id);
                // 저장 목록 학습 중 카드를 해제하면 목록에서 제거할지 선택 가능하지만,
                // UX상 현재는 보기를 유지하고 나가서 다시 들어올 때 갱신되게 함
            } else {
                savedIds.push(id);
            }
            
            localStorage.setItem('saved_flashcards', JSON.stringify(savedIds));
            updateSaveIcon(id);
        }

        function jumpToCard(val) {
            const total = activeData[currentCategory].length;
            if (isNaN(val) || val < 1) val = 1;
            if (val > total) val = total;
            
            currentIndex[currentCategory] = val - 1;
            updateCard();
        }

        document.getElementById('jump-input').addEventListener('change', function(e) {
            jumpToCard(parseInt(e.target.value));
        });

        function flipCard() {
            isFlipped = !isFlipped;
            document.getElementById('card-inner').classList.toggle('flipped', isFlipped);
        }

        function nextCard() {
            if (currentIndex[currentCategory] < activeData[currentCategory].length - 1) {
                currentIndex[currentCategory]++;
                updateCard();
            }
        }

        function prevCard() {
            if (currentIndex[currentCategory] > 0) {
                currentIndex[currentCategory]--;
                updateCard();
            }
        }

        function shuffleCurrent() {
            activeData[currentCategory].sort(() => Math.random() - 0.5);
            currentIndex[currentCategory] = 0;
            updateCard();
        }

        // Keybindings
        document.addEventListener('keydown', (e) => {
            const isStudyVisible = !document.getElementById('study-view').classList.contains('hidden');
            if (!isStudyVisible) return;
            if (document.activeElement.id === 'jump-input') return;

            if (e.code === 'Space') { e.preventDefault(); flipCard(); }
            if (e.code === 'ArrowRight') nextCard();
            if (e.code === 'ArrowLeft') prevCard();
            if (e.code === 'Escape') goBack();
            if (e.code === 'KeyS') toggleSaveCurrent(); // 'S'키로 저장 토글
        });

        // 초기 실행
        updateMenuLabels();
    </script>
