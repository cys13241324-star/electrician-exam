<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전류분배 법칙 시뮬레이터</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background:#f8fafc; font-family:'Pretendard',system-ui,sans-serif; }
  .panel { background:#fff; border-radius:12px; box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.08); }
  input[type=range]{accent-color:#2563eb;}
  .bar-cell{transition:height .25s ease;}
</style>
</head>
<body class="p-4 md:p-8">
  <div class="max-w-6xl mx-auto">
    <header class="mb-6 text-center">
      <h1 class="text-3xl font-bold text-slate-800">🔀 전류분배 법칙 시뮬레이터</h1>
      <p class="text-slate-600 mt-2">병렬 회로에서 각 가지로 전류가 어떻게 분배되는지 시각화. 저항이 작은 쪽에 더 많이 흐릅니다.</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="lg:col-span-2 panel p-6">
        <svg id="diagram" viewBox="0 0 640 320" class="w-full bg-white rounded-lg border border-slate-100"></svg>

        <div class="mt-6">
          <p class="text-sm font-bold text-slate-700 mb-2">전류 분배 비율</p>
          <div class="flex items-end gap-2 h-40 px-2 border-b-2 border-slate-200">
            <div id="bar1" class="bar-cell flex-1 bg-blue-500 rounded-t flex items-end justify-center pb-1 text-white text-xs font-bold" style="height:0%">I₁</div>
            <div id="bar2" class="bar-cell flex-1 bg-emerald-500 rounded-t flex items-end justify-center pb-1 text-white text-xs font-bold" style="height:0%">I₂</div>
          </div>
          <div class="grid grid-cols-2 gap-2 text-center mt-2 text-xs text-slate-600">
            <div>R₁ 가지</div><div>R₂ 가지</div>
          </div>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-5 text-center">
          <div class="bg-rose-50 rounded-lg p-3"><div class="text-xs text-rose-700">전원 V</div><div id="vOut" class="text-lg font-bold text-rose-900">-</div></div>
          <div class="bg-violet-50 rounded-lg p-3"><div class="text-xs text-violet-700">총 전류 I</div><div id="iTot" class="text-lg font-bold text-violet-900">-</div></div>
          <div class="bg-blue-50 rounded-lg p-3"><div class="text-xs text-blue-700">I₁</div><div id="i1Out" class="text-lg font-bold text-blue-900">-</div></div>
          <div class="bg-emerald-50 rounded-lg p-3"><div class="text-xs text-emerald-700">I₂</div><div id="i2Out" class="text-lg font-bold text-emerald-900">-</div></div>
        </div>
        <div class="bg-slate-50 rounded-lg p-3 mt-3 text-center">
          <div class="text-xs text-slate-600">합성 저항 (병렬)</div>
          <div id="rEq" class="text-lg font-bold text-slate-800">-</div>
        </div>
      </div>

      <div class="panel p-6 space-y-4">
        <h2 class="font-bold text-slate-800">변수 조절</h2>

        <div>
          <label class="text-sm flex justify-between"><span>전원 V</span><span id="vVal" class="font-mono">12</span> V</label>
          <input type="range" id="v" min="1" max="50" value="12" class="w-full">
        </div>
        <div>
          <label class="text-sm flex justify-between"><span class="text-blue-700">R₁</span><span id="r1Val" class="font-mono">2</span> Ω</label>
          <input type="range" id="r1" min="1" max="50" value="2" class="w-full">
        </div>
        <div>
          <label class="text-sm flex justify-between"><span class="text-emerald-700">R₂</span><span id="r2Val" class="font-mono">4</span> Ω</label>
          <input type="range" id="r2" min="1" max="50" value="4" class="w-full">
        </div>

        <div class="bg-slate-50 rounded-lg p-3 text-xs text-slate-600 space-y-1">
          <p class="font-bold text-slate-800">전류분배 공식 (두 저항)</p>
          <p>I₁ = I · R₂ / (R₁+R₂)</p>
          <p>I₂ = I · R₁ / (R₁+R₂)</p>
          <p class="pt-1 text-amber-700">주의: 분자에 상대 저항!</p>
        </div>

        <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 text-xs text-amber-800">
          <p class="font-bold">💡 실험 포인트</p>
          <p class="mt-1">R₁을 R₂의 절반으로 맞춰보세요. I₁이 I₂의 두 배가 되는지 확인.</p>
        </div>
      </div>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
["v","r1","r2"].forEach(id => $(id).addEventListener("input", render));

function render() {
  const V = +$("v").value;
  const R1 = +$("r1").value, R2 = +$("r2").value;
  $("vVal").textContent = V;
  $("r1Val").textContent = R1; $("r2Val").textContent = R2;

  // 병렬: 각 가지에 V가 동일하게 걸림
  const I1 = V / R1, I2 = V / R2;
  const Itot = I1 + I2;
  const Req = (R1 * R2) / (R1 + R2);

  $("vOut").textContent = V.toFixed(1) + " V";
  $("iTot").textContent = Itot.toFixed(3) + " A";
  $("i1Out").textContent = I1.toFixed(3) + " A";
  $("i2Out").textContent = I2.toFixed(3) + " A";
  $("rEq").textContent = Req.toFixed(2) + " Ω";

  const max = Math.max(I1, I2, 0.001);
  $("bar1").style.height = (I1/max*100).toFixed(1) + "%";
  $("bar2").style.height = (I2/max*100).toFixed(1) + "%";
  $("bar1").textContent = "I₁ " + I1.toFixed(2) + "A";
  $("bar2").textContent = "I₂ " + I2.toFixed(2) + "A";

  drawCircuit(V, R1, R2, I1, I2, Itot);
}

function drawCircuit(V, R1, R2, I1, I2, Itot) {
  const svg = $("diagram");
  let s = "";
  // 전압원 (left)
  s += `<rect x="30" y="130" width="50" height="80" fill="none" stroke="#0f172a" stroke-width="2" rx="6"/>`;
  s += `<text x="55" y="165" text-anchor="middle" font-size="16" font-weight="bold" fill="#dc2626">${V}V</text>`;
  s += `<text x="55" y="185" text-anchor="middle" font-size="10" fill="#64748b">전원</text>`;

  // 상단 라인 (전압원에서 분기점까지)
  s += `<line x1="80" y1="150" x2="280" y2="150" stroke="#0f172a" stroke-width="2"/>`;
  // 하단 라인
  s += `<line x1="80" y1="190" x2="280" y2="190" stroke="#0f172a" stroke-width="2"/>`;

  // 분기점 → 두 갈래
  // 위쪽 가지 (R1)
  s += `<line x1="280" y1="150" x2="280" y2="80" stroke="#0f172a" stroke-width="2"/>`;
  s += `<line x1="280" y1="80" x2="500" y2="80" stroke="#0f172a" stroke-width="2"/>`;
  s += `<rect x="350" y="65" width="80" height="30" fill="white" stroke="#3b82f6" stroke-width="3" rx="4"/>`;
  s += `<text x="390" y="85" text-anchor="middle" font-size="13" font-weight="bold" fill="#3b82f6">R₁=${R1}Ω</text>`;
  s += `<line x1="500" y1="80" x2="500" y2="150" stroke="#0f172a" stroke-width="2"/>`;

  // 아래쪽 가지 (R2)
  s += `<line x1="280" y1="190" x2="280" y2="260" stroke="#0f172a" stroke-width="2"/>`;
  s += `<line x1="280" y1="260" x2="500" y2="260" stroke="#0f172a" stroke-width="2"/>`;
  s += `<rect x="350" y="245" width="80" height="30" fill="white" stroke="#10b981" stroke-width="3" rx="4"/>`;
  s += `<text x="390" y="265" text-anchor="middle" font-size="13" font-weight="bold" fill="#10b981">R₂=${R2}Ω</text>`;
  s += `<line x1="500" y1="190" x2="500" y2="260" stroke="#0f172a" stroke-width="2"/>`;

  // 우측 합류
  s += `<line x1="500" y1="150" x2="580" y2="150" stroke="#0f172a" stroke-width="2"/>`;
  s += `<line x1="500" y1="190" x2="580" y2="190" stroke="#0f172a" stroke-width="2"/>`;
  s += `<line x1="580" y1="150" x2="580" y2="190" stroke="#0f172a" stroke-width="2"/>`;

  // 분기점 마커
  s += `<circle cx="280" cy="150" r="4" fill="#0f172a"/>`;
  s += `<circle cx="280" cy="190" r="4" fill="#0f172a"/>`;
  s += `<circle cx="500" cy="150" r="4" fill="#0f172a"/>`;
  s += `<circle cx="500" cy="190" r="4" fill="#0f172a"/>`;

  // 전류 라벨
  s += `<text x="180" y="140" font-size="12" font-weight="bold" fill="#8b5cf6">I = ${Itot.toFixed(2)}A →</text>`;
  s += `<text x="320" y="55" font-size="12" font-weight="bold" fill="#3b82f6">I₁ = ${I1.toFixed(2)}A</text>`;
  s += `<text x="320" y="295" font-size="12" font-weight="bold" fill="#10b981">I₂ = ${I2.toFixed(2)}A</text>`;

  // 흐름 애니메이션 — 위 가지
  const flow1 = Math.min(12, Math.max(2, I1*4));
  for (let n=0; n<flow1; n++) {
    const x = 295 + n*16;
    if (x < 495) {
      s += `<circle cx="${x}" cy="80" r="3" fill="#3b82f6"><animate attributeName="cx" from="${x}" to="${x+16}" dur="0.5s" repeatCount="indefinite"/></circle>`;
    }
  }
  const flow2 = Math.min(12, Math.max(2, I2*4));
  for (let n=0; n<flow2; n++) {
    const x = 295 + n*16;
    if (x < 495) {
      s += `<circle cx="${x}" cy="260" r="3" fill="#10b981"><animate attributeName="cx" from="${x}" to="${x+16}" dur="0.5s" repeatCount="indefinite"/></circle>`;
    }
  }
  s += `<text x="320" y="315" text-anchor="middle" font-size="11" fill="#64748b">I = I₁ + I₂ (KCL)</text>`;

  svg.innerHTML = s;
}

render();
</script>
</body>
</html>
