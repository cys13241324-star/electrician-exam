<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>접지 저항 시뮬레이터</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background:#f8fafc; font-family:'Pretendard',system-ui,sans-serif; }
  .panel { background:#fff; border-radius:12px; box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.08); }
  input[type=range]{accent-color:#059669;}
</style>
</head>
<body class="p-4 md:p-8">
  <div class="max-w-6xl mx-auto">
    <header class="mb-6 text-center">
      <h1 class="text-3xl font-bold text-slate-800">🌍 접지 저항 시뮬레이터</h1>
      <p class="text-slate-600 mt-2">토양 저항률과 전극 형상에 따른 접지 저항을 단주식·판상식으로 비교합니다.</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="lg:col-span-2 panel p-6">
        <svg id="diagram" viewBox="0 0 600 320" class="w-full h-auto bg-white rounded-lg border border-slate-100"></svg>

        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-5 text-center">
          <div class="bg-emerald-50 rounded-lg p-3"><div class="text-xs text-emerald-700">접지 저항 R</div><div id="rg" class="text-lg font-bold text-emerald-900">-</div></div>
          <div class="bg-blue-50 rounded-lg p-3"><div class="text-xs text-blue-700">전류 I (V/R)</div><div id="ig" class="text-lg font-bold text-blue-900">-</div></div>
          <div class="bg-amber-50 rounded-lg p-3"><div class="text-xs text-amber-700">접지 저항 등급</div><div id="grade" class="text-lg font-bold text-amber-900">-</div></div>
          <div class="bg-rose-50 rounded-lg p-3"><div class="text-xs text-rose-700">기준 합부</div><div id="passfail" class="text-lg font-bold text-rose-900">-</div></div>
        </div>
      </div>

      <div class="panel p-6 space-y-4">
        <h2 class="font-bold text-slate-800">변수 조절</h2>
        <div>
          <label class="text-sm font-semibold text-slate-700">전극 형식</label>
          <div class="flex gap-1 rounded-md bg-slate-100 p-1 mt-1 text-xs font-semibold">
            <button data-type="rod" class="type-btn flex-1 py-1.5 rounded">봉형</button>
            <button data-type="plate" class="type-btn flex-1 py-1.5 rounded">판형</button>
          </div>
        </div>
        <div>
          <label class="text-sm flex justify-between"><span>토양 저항률 ρ</span><span id="rhoVal" class="font-mono">100</span> Ω·m</label>
          <input type="range" id="rho" min="10" max="1000" step="10" value="100" class="w-full">
        </div>
        <div>
          <label class="text-sm flex justify-between"><span>봉 길이 L</span><span id="lVal" class="font-mono">2.0</span> m</label>
          <input type="range" id="l" min="0.5" max="5" step="0.1" value="2.0" class="w-full">
        </div>
        <div>
          <label class="text-sm flex justify-between"><span>봉 직경 d</span><span id="dVal" class="font-mono">14</span> mm</label>
          <input type="range" id="d" min="8" max="30" value="14" class="w-full">
        </div>
        <div>
          <label class="text-sm flex justify-between"><span>판 면적 A (판형)</span><span id="aVal" class="font-mono">0.9</span> m²</label>
          <input type="range" id="a" min="0.3" max="3" step="0.1" value="0.9" class="w-full">
        </div>
        <div>
          <label class="text-sm flex justify-between"><span>접지 등급</span></label>
          <select id="grade-sel" class="w-full mt-1 rounded border border-slate-300 px-2 py-1 text-sm">
            <option value="10">제1종 (10Ω 이하)</option>
            <option value="100" selected>제2종 (100Ω 이하)</option>
            <option value="100_3">제3종 (100Ω 이하)</option>
          </select>
        </div>
      </div>
    </div>

    <div class="panel p-6 mt-6 text-xs text-slate-600 space-y-1">
      <p><strong>봉형:</strong> R = ρ/(2πL) · ln(4L/d) — 단봉식 근사</p>
      <p><strong>판형:</strong> R = ρ/(4√(A/π)) — 매설판 접지 근사</p>
      <p>실제 시공에서는 토양 함수율, 매설 깊이, 다중 봉 보정계수가 함께 적용됩니다.</p>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
let type = "rod";

document.querySelectorAll(".type-btn").forEach(b => b.addEventListener("click", () => {
  type = b.dataset.type;
  document.querySelectorAll(".type-btn").forEach(x => x.classList.remove("bg-white","shadow"));
  b.classList.add("bg-white","shadow");
  render();
}));
document.querySelector('[data-type="rod"]').classList.add("bg-white","shadow");

["rho","l","d","a","grade-sel"].forEach(id => $(id).addEventListener("input", render));

function render(){
  const rho=+$("rho").value, L=+$("l").value, d=+$("d").value/1000, A=+$("a").value;
  $("rhoVal").textContent=rho; $("lVal").textContent=L.toFixed(1); $("dVal").textContent=$("d").value; $("aVal").textContent=A.toFixed(1);
  let R;
  if (type === "rod") {
    R = (rho/(2*Math.PI*L)) * Math.log(4*L/d);
  } else {
    R = rho / (4*Math.sqrt(A/Math.PI));
  }
  const I = 220 / R;
  const limit = +$("grade-sel").value.split("_")[0];
  const pass = R <= limit;

  $("rg").textContent = R.toFixed(1)+" Ω";
  $("ig").textContent = I.toFixed(2)+" A";
  $("grade").textContent = R<10?"매우 우수":R<50?"양호":R<100?"보통":"개선 필요";
  $("passfail").textContent = pass ? `합격 (≤${limit}Ω)` : `초과 (${limit}Ω 한도)`;
  $("passfail").className = "text-lg font-bold " + (pass ? "text-emerald-700" : "text-rose-700");

  drawDiagram(type, L, A, R);
}

function drawDiagram(type, L, A, R){
  const svg = $("diagram");
  // soil background
  let s = `<defs><linearGradient id="soil" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#a16207"/><stop offset="1" stop-color="#422006"/></linearGradient></defs>`;
  s += `<rect x="0" y="0" width="600" height="100" fill="#bfdbfe"/>`;
  s += `<text x="20" y="30" font-size="13" fill="#1e3a8a" font-weight="bold">대지 위</text>`;
  s += `<rect x="0" y="100" width="600" height="220" fill="url(#soil)"/>`;
  // ground line
  s += `<line x1="0" y1="100" x2="600" y2="100" stroke="#78350f" stroke-width="2"/>`;
  // grid lines (equipotential rings)
  const cx = 300, cy = 100;
  for (let i=1;i<=5;i++){
    const radius = i*40;
    s += `<ellipse cx="${cx}" cy="${cy}" rx="${radius}" ry="${radius*0.5}" fill="none" stroke="#fbbf24" stroke-width="${1.6 - i*0.2}" stroke-dasharray="3,3" opacity="${0.5 - i*0.06}"/>`;
  }

  // wire from above
  s += `<line x1="${cx}" y1="0" x2="${cx}" y2="100" stroke="#ef4444" stroke-width="3"/>`;
  s += `<text x="${cx+10}" y="50" font-size="12" fill="#ef4444" font-weight="bold">220V</text>`;

  if (type === "rod") {
    // electrode rod
    const lengthPx = Math.min(200, L*40);
    s += `<rect x="${cx-5}" y="100" width="10" height="${lengthPx}" fill="#475569"/>`;
    s += `<text x="${cx+12}" y="${100 + lengthPx/2}" font-size="12" fill="#f1f5f9">L=${L.toFixed(1)}m</text>`;
  } else {
    // plate
    const halfW = Math.min(120, Math.sqrt(A)*60);
    s += `<rect x="${cx-halfW}" y="180" width="${halfW*2}" height="14" fill="#475569"/>`;
    s += `<text x="${cx}" y="220" text-anchor="middle" font-size="12" fill="#f1f5f9">판 A=${A.toFixed(1)}m²</text>`;
  }

  // resistance label
  s += `<rect x="430" y="230" width="150" height="60" fill="white" stroke="#10b981" stroke-width="2" rx="8"/>`;
  s += `<text x="505" y="252" text-anchor="middle" font-size="11" fill="#0f766e">접지 저항</text>`;
  s += `<text x="505" y="278" text-anchor="middle" font-size="20" fill="#065f46" font-weight="bold">${R.toFixed(1)} Ω</text>`;

  svg.innerHTML = s;
}

render();
</script>
</body>
</html>
