<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직병렬 회로 시뮬레이터</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background:#f8fafc; font-family:'Pretendard',system-ui,sans-serif; }
  .panel { background:#fff; border-radius:12px; box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.08); }
  input[type=range]{accent-color:#2563eb;}
</style>
</head>
<body class="p-4 md:p-8">
  <div class="max-w-6xl mx-auto">
    <header class="mb-6 text-center">
      <h1 class="text-3xl font-bold text-slate-800">⚡ 직병렬 회로 시뮬레이터</h1>
      <p class="text-slate-600 mt-2">저항 배치를 바꾸면 합성 저항과 전류 분배가 즉시 계산됩니다.</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="lg:col-span-2 panel p-6">
        <div class="flex justify-between items-center mb-4">
          <span class="text-sm font-semibold text-slate-600">회로 구성</span>
          <div class="flex gap-1 rounded-md bg-slate-100 p-1 text-xs font-semibold">
            <button data-mode="series" class="mode-btn px-3 py-1 rounded">직렬</button>
            <button data-mode="parallel" class="mode-btn px-3 py-1 rounded">병렬</button>
            <button data-mode="hybrid" class="mode-btn px-3 py-1 rounded">직병렬</button>
          </div>
        </div>
        <svg id="circuit" viewBox="0 0 600 280" class="w-full h-auto bg-white rounded-lg border border-slate-100"></svg>

        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-5 text-center">
          <div class="bg-blue-50 rounded-lg p-3"><div class="text-xs text-blue-700">합성 저항</div><div id="rTotal" class="text-lg font-bold text-blue-900">0 Ω</div></div>
          <div class="bg-emerald-50 rounded-lg p-3"><div class="text-xs text-emerald-700">총 전류 I</div><div id="iTotal" class="text-lg font-bold text-emerald-900">0 A</div></div>
          <div class="bg-amber-50 rounded-lg p-3"><div class="text-xs text-amber-700">전압원 V</div><div id="vDisp" class="text-lg font-bold text-amber-900">0 V</div></div>
          <div class="bg-rose-50 rounded-lg p-3"><div class="text-xs text-rose-700">총 전력 P</div><div id="pTotal" class="text-lg font-bold text-rose-900">0 W</div></div>
        </div>
      </div>

      <div class="panel p-6 space-y-4">
        <h2 class="font-bold text-slate-800">변수 조절</h2>
        <div>
          <label class="text-sm flex justify-between"><span>전압원 V</span><span id="vVal" class="font-mono text-slate-700">12</span> V</label>
          <input type="range" id="v" min="1" max="30" value="12" class="w-full">
        </div>
        <div>
          <label class="text-sm flex justify-between"><span>저항 R₁</span><span id="r1Val" class="font-mono text-slate-700">10</span> Ω</label>
          <input type="range" id="r1" min="1" max="100" value="10" class="w-full">
        </div>
        <div>
          <label class="text-sm flex justify-between"><span>저항 R₂</span><span id="r2Val" class="font-mono text-slate-700">20</span> Ω</label>
          <input type="range" id="r2" min="1" max="100" value="20" class="w-full">
        </div>
        <div>
          <label class="text-sm flex justify-between"><span>저항 R₃</span><span id="r3Val" class="font-mono text-slate-700">30</span> Ω</label>
          <input type="range" id="r3" min="1" max="100" value="30" class="w-full">
        </div>

        <div class="bg-slate-50 rounded-lg p-3 text-xs text-slate-600 space-y-2 mt-4">
          <p><strong>직렬:</strong> R = R₁+R₂+R₃, 전류 동일</p>
          <p><strong>병렬:</strong> 1/R = 1/R₁+1/R₂+1/R₃, 전압 동일</p>
          <p><strong>직병렬:</strong> R₁ + (R₂∥R₃)</p>
        </div>
      </div>
    </div>

    <div class="panel p-6 mt-6">
      <h3 class="font-bold text-slate-800 mb-3">각 저항별 측정값</h3>
      <table class="w-full text-sm">
        <thead><tr class="text-left text-slate-500 border-b"><th class="py-2">저항</th><th>값</th><th>전류</th><th>전압</th><th>전력</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
let mode = "series";

document.querySelectorAll(".mode-btn").forEach(b => b.addEventListener("click", () => {
  mode = b.dataset.mode;
  document.querySelectorAll(".mode-btn").forEach(x => x.classList.remove("bg-white","shadow"));
  b.classList.add("bg-white","shadow");
  render();
}));
document.querySelector('[data-mode="series"]').classList.add("bg-white","shadow");

["v","r1","r2","r3"].forEach(id => $(id).addEventListener("input", render));

function render() {
  const V = +$("v").value, R1 = +$("r1").value, R2 = +$("r2").value, R3 = +$("r3").value;
  $("vVal").textContent = V; $("r1Val").textContent = R1; $("r2Val").textContent = R2; $("r3Val").textContent = R3;

  let Rt, branches;
  if (mode === "series") {
    Rt = R1 + R2 + R3;
    const I = V / Rt;
    branches = [{r:R1,i:I,v:I*R1},{r:R2,i:I,v:I*R2},{r:R3,i:I,v:I*R3}];
  } else if (mode === "parallel") {
    Rt = 1/(1/R1+1/R2+1/R3);
    branches = [{r:R1,i:V/R1,v:V},{r:R2,i:V/R2,v:V},{r:R3,i:V/R3,v:V}];
  } else {
    const Rp = (R2*R3)/(R2+R3);
    Rt = R1 + Rp;
    const I = V/Rt;
    const Vp = I * Rp;
    branches = [{r:R1,i:I,v:I*R1},{r:R2,i:Vp/R2,v:Vp},{r:R3,i:Vp/R3,v:Vp}];
  }
  const I_total = V/Rt;
  $("rTotal").textContent = Rt.toFixed(2)+" Ω";
  $("iTotal").textContent = I_total.toFixed(3)+" A";
  $("vDisp").textContent = V+" V";
  $("pTotal").textContent = (V*I_total).toFixed(2)+" W";

  $("rows").innerHTML = branches.map((b,i)=>`<tr class="border-b border-slate-100"><td class="py-2 font-semibold">R${i+1}</td><td>${b.r} Ω</td><td class="text-emerald-700">${b.i.toFixed(3)} A</td><td class="text-blue-700">${b.v.toFixed(2)} V</td><td class="text-rose-700">${(b.i*b.v).toFixed(2)} W</td></tr>`).join("");

  drawCircuit(mode);
}

function drawCircuit(m) {
  const svg = $("circuit");
  let body = `
    <text x="60" y="145" text-anchor="middle" font-size="22" font-weight="bold" fill="#0f172a">${$("v").value}V</text>
    <circle cx="60" cy="140" r="30" fill="none" stroke="#0f172a" stroke-width="2"/>
    <line x1="60" y1="110" x2="60" y2="100" stroke="#0f172a" stroke-width="2"/>
    <line x1="60" y1="180" x2="60" y2="190" stroke="#0f172a" stroke-width="2"/>
    <line x1="60" y1="100" x2="120" y2="100" stroke="#0f172a" stroke-width="2"/>
    <line x1="60" y1="190" x2="120" y2="190" stroke="#0f172a" stroke-width="2"/>`;

  function R(x,y,label,color){
    return `<g><rect x="${x}" y="${y-12}" width="60" height="24" fill="white" stroke="${color}" stroke-width="2" rx="3"/><text x="${x+30}" y="${y+5}" text-anchor="middle" font-size="13" font-weight="bold" fill="${color}">${label}</text></g>`;
  }

  if (m === "series") {
    body += `<line x1="120" y1="100" x2="180" y2="100" stroke="#0f172a" stroke-width="2"/>`;
    body += R(180,100,"R₁","#2563eb");
    body += `<line x1="240" y1="100" x2="300" y2="100" stroke="#0f172a" stroke-width="2"/>`;
    body += R(300,100,"R₂","#10b981");
    body += `<line x1="360" y1="100" x2="420" y2="100" stroke="#0f172a" stroke-width="2"/>`;
    body += R(420,100,"R₃","#f59e0b");
    body += `<line x1="480" y1="100" x2="540" y2="100" stroke="#0f172a" stroke-width="2"/>`;
    body += `<line x1="540" y1="100" x2="540" y2="190" stroke="#0f172a" stroke-width="2"/>`;
    body += `<line x1="540" y1="190" x2="120" y2="190" stroke="#0f172a" stroke-width="2"/>`;
  } else if (m === "parallel") {
    body += `<line x1="120" y1="100" x2="200" y2="100" stroke="#0f172a" stroke-width="2"/>`;
    body += `<line x1="200" y1="50" x2="200" y2="240" stroke="#0f172a" stroke-width="2"/>`;
    body += `<line x1="200" y1="60" x2="280" y2="60" stroke="#0f172a" stroke-width="2"/>`;
    body += R(280,60,"R₁","#2563eb");
    body += `<line x1="340" y1="60" x2="420" y2="60" stroke="#0f172a" stroke-width="2"/>`;
    body += `<line x1="200" y1="140" x2="280" y2="140" stroke="#0f172a" stroke-width="2"/>`;
    body += R(280,140,"R₂","#10b981");
    body += `<line x1="340" y1="140" x2="420" y2="140" stroke="#0f172a" stroke-width="2"/>`;
    body += `<line x1="200" y1="220" x2="280" y2="220" stroke="#0f172a" stroke-width="2"/>`;
    body += R(280,220,"R₃","#f59e0b");
    body += `<line x1="340" y1="220" x2="420" y2="220" stroke="#0f172a" stroke-width="2"/>`;
    body += `<line x1="420" y1="60" x2="420" y2="220" stroke="#0f172a" stroke-width="2"/>`;
    body += `<line x1="420" y1="100" x2="540" y2="100" stroke="#0f172a" stroke-width="2"/>`;
    body += `<line x1="540" y1="100" x2="540" y2="190" stroke="#0f172a" stroke-width="2"/>`;
    body += `<line x1="540" y1="190" x2="120" y2="190" stroke="#0f172a" stroke-width="2"/>`;
  } else {
    body += `<line x1="120" y1="100" x2="180" y2="100" stroke="#0f172a" stroke-width="2"/>`;
    body += R(180,100,"R₁","#2563eb");
    body += `<line x1="240" y1="100" x2="300" y2="100" stroke="#0f172a" stroke-width="2"/>`;
    body += `<line x1="300" y1="60" x2="300" y2="160" stroke="#0f172a" stroke-width="2"/>`;
    body += `<line x1="300" y1="60" x2="380" y2="60" stroke="#0f172a" stroke-width="2"/>`;
    body += R(380,60,"R₂","#10b981");
    body += `<line x1="440" y1="60" x2="500" y2="60" stroke="#0f172a" stroke-width="2"/>`;
    body += `<line x1="300" y1="160" x2="380" y2="160" stroke="#0f172a" stroke-width="2"/>`;
    body += R(380,160,"R₃","#f59e0b");
    body += `<line x1="440" y1="160" x2="500" y2="160" stroke="#0f172a" stroke-width="2"/>`;
    body += `<line x1="500" y1="60" x2="500" y2="160" stroke="#0f172a" stroke-width="2"/>`;
    body += `<line x1="500" y1="100" x2="540" y2="100" stroke="#0f172a" stroke-width="2"/>`;
    body += `<line x1="540" y1="100" x2="540" y2="190" stroke="#0f172a" stroke-width="2"/>`;
    body += `<line x1="540" y1="190" x2="120" y2="190" stroke="#0f172a" stroke-width="2"/>`;
  }
  svg.innerHTML = body;
}

render();
</script>
</body>
</html>
